name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check content script syntax
        run: node --check content.js

      - name: Check popup script syntax
        run: node --check popup.js

      - name: Check tests syntax
        run: |
          node --check tests/content.test.js
          node --check tests/i18n.test.js
          node --check tests/popup.test.js
          node --check tests/manifest.test.js

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"

      - name: Run tests
        continue-on-error: true
        run: |
          node --test --test-reporter spec --test-reporter-destination stdout --test-reporter junit --test-reporter-destination test-results.xml tests/*.test.js

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Node.js Tests
          path: test-results.xml
          reporter: jest-junit
          fail-on-error: true
