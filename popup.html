<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deal Store Filter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <section id="main-view" class="popup-view">
        <header>
          <div>
            <h1 id="main-title">Deal Store Filter</h1>
            <span id="sync-badge">Firefox Sync</span>
          </div>
          <button
            id="settings-toggle"
            class="icon-button"
            type="button"
            aria-controls="settings-view"
            aria-label="Settings"
            title="Settings"
          >&#9881;</button>
        </header>

        <div
          id="filter-tabs"
          class="filter-tabs"
          role="tablist"
          aria-label="Filter type"
        >
          <button
            id="tab-shops"
            class="tab-button is-active"
            type="button"
            role="tab"
            aria-selected="true"
          >Shops</button>
          <button
            id="tab-categories"
            class="tab-button"
            type="button"
            role="tab"
            aria-selected="false"
          >Categories</button>
        </div>

        <form id="store-form">
          <label id="filter-input-label" for="store-name">Store to hide</label>
          <div class="input-row">
            <input id="store-name" name="store-name" type="text" autocomplete="off" required placeholder="Amazon.pl">
            <button id="add-filter-button" type="submit">Add</button>
          </div>
        </form>

        <p id="storage-status" class="status" role="status"></p>
        <ul id="store-list"></ul>
        <button id="clear-filters" class="secondary danger" type="button">Clear shops</button>
        <button id="toggle-filters" class="secondary filter-toggle" type="button"></button>
      </section>

      <section id="settings-view" class="popup-view" hidden>
        <header class="settings-header">
          <button
            id="settings-back"
            class="icon-button"
            type="button"
            aria-label="Back"
            title="Back"
          >&#8592;</button>
          <h1 id="settings-title">Settings</h1>
        </header>

        <div class="settings-panel">
          <label class="settings-field" for="ui-language">
            <span id="ui-language-label">Language</span>
            <select id="ui-language">
              <option value="auto">Automatic (page/browser)</option>
              <option value="pl">Polski</option>
              <option value="en">English</option>
            </select>
          </label>
          <label class="checkbox-row" for="use-firefox-sync">
            <input id="use-firefox-sync" type="checkbox">
            <span>
              <span id="use-firefox-sync-label">Firefox Sync</span>
              <small id="use-firefox-sync-hint">(requires Firefox account)</small>
            </span>
          </label>
          <label class="checkbox-row" for="always-filter-on-open">
            <input id="always-filter-on-open" type="checkbox">
            <span id="always-filter-on-open-label">Always filter when opening a page</span>
          </label>
          <label class="checkbox-row" for="category-filters-enabled">
            <input id="category-filters-enabled" type="checkbox">
            <span id="category-filters-enabled-label">Enable category filters</span>
          </label>
          <label class="checkbox-row" for="show-filtered-as-dimmed">
            <input id="show-filtered-as-dimmed" type="checkbox">
            <span id="show-filtered-as-dimmed-label">Show filtered deals as compact previews</span>
          </label>
          <div class="settings-option">
            <label class="checkbox-row" for="show-filtered-above-threshold">
              <input id="show-filtered-above-threshold" type="checkbox">
              <span id="show-filtered-above-threshold-label">Show filtered deals above this threshold</span>
            </label>
            <label class="settings-field" for="show-filtered-threshold">
              <span id="show-filtered-threshold-label">Show filtered deals threshold</span>
              <input
                id="show-filtered-threshold"
                type="number"
                min="0"
                step="1"
                inputmode="numeric"
                placeholder="200"
              >
            </label>
          </div>
          <div class="settings-option">
            <label class="checkbox-row" for="hide-unfiltered-below-threshold">
              <input id="hide-unfiltered-below-threshold" type="checkbox">
              <span id="hide-unfiltered-below-threshold-label">Hide deals below this threshold</span>
            </label>
            <label class="settings-field" for="hide-unfiltered-threshold">
              <span id="hide-unfiltered-threshold-label">Hide deals threshold</span>
              <input
                id="hide-unfiltered-threshold"
                type="number"
                min="0"
                step="1"
                inputmode="numeric"
                placeholder="50"
              >
            </label>
            <label class="checkbox-row" for="show-below-threshold-as-dimmed">
              <input id="show-below-threshold-as-dimmed" type="checkbox">
              <span id="show-below-threshold-as-dimmed-label">Show deals below threshold as compact previews</span>
            </label>
          </div>
        </div>
      </section>
    </main>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
