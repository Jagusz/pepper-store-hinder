<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deal Store Filter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <section id="main-view" class="popup-view">
        <header>
          <div>
            <h1>Deal Store Filter</h1>
            <span>Firefox Sync</span>
          </div>
          <button
            id="settings-toggle"
            class="icon-button"
            type="button"
            aria-controls="settings-view"
            title="Settings"
          >&#9881;</button>
        </header>

        <form id="store-form">
          <label for="store-name">Store to hide</label>
          <div class="input-row">
            <input id="store-name" name="store-name" type="text" autocomplete="off" required>
            <button type="submit">Add</button>
          </div>
        </form>

        <p id="storage-status" class="status" role="status"></p>
        <ul id="store-list"></ul>
        <button id="toggle-filters" class="secondary filter-toggle" type="button"></button>
      </section>

      <section id="settings-view" class="popup-view" hidden>
        <header class="settings-header">
          <button
            id="settings-back"
            class="icon-button"
            type="button"
            title="Back"
          >&#8592;</button>
          <h1>Settings</h1>
        </header>

        <div class="settings-panel">
          <label class="checkbox-row" for="use-firefox-sync">
            <input id="use-firefox-sync" type="checkbox">
            <span>Firefox Sync <small>(requires Firefox account)</small></span>
          </label>
          <label class="checkbox-row" for="always-filter-on-open">
            <input id="always-filter-on-open" type="checkbox">
            <span>Always filter when opening a page</span>
          </label>
        </div>
        <button id="clear-stores" class="secondary danger" type="button">Clear list</button>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
